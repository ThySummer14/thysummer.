name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 强制安装 Node.js 22 (这是解决问题的关键！)
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      # 2. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      # 3. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 4. 执行构建 (这里会进行真正的 astro build)
      - name: Build Astro
        run: pnpm run build

      # 5. 上传构建后的产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
