<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日十四行诗</title>
    <style>
        /* =========================================
           1. 夏日诗集主题变量
           ========================================= */
        :root {
            --bg-paper: #FAFCFA; 
            --text-dark: #2C3E2D; 
            --text-muted: #7A8F7B; 
            --sage-green: #81A284; 
            --mint-light: #E8F0E6; 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background-color: var(--bg-paper);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
        }

        /* 夏日飘落特效 */
        #bg-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .leaf {
            position: absolute; top: -10%;
            background: var(--sage-green);
            border-radius: 50% 0 50% 0;
            opacity: 0.3;
            will-change: transform;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translate3d(15vw, 110vh, 0) rotate(360deg); opacity: 0; }
        }

        /* 头部排版 */
        header { position: relative; z-index: 10; padding: 50px 20px 20px; text-align: center; }
        h1 { margin: 0; font-size: 32px; letter-spacing: 4px; color: var(--sage-green); font-weight: normal; }

        .poetry-card {
            background: linear-gradient(135deg, #ffffff 0%, var(--mint-light) 100%);
            max-width: 650px; margin: 30px auto; padding: 40px 30px;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(129, 162, 132, 0.1);
            position: relative;
        }
        .poetry-card::before {
            content: '“'; position: absolute; top: 10px; left: 30px;
            font-size: 80px; color: var(--sage-green); opacity: 0.15; font-family: serif;
        }
        .poetry-en { font-style: italic; font-size: 15px; color: var(--text-muted); margin-bottom: 12px;}
        .poetry-zh { font-size: 18px; letter-spacing: 2px; color: var(--text-dark); line-height: 1.8;}

        .btn {
            background: var(--sage-green); color: white; border: none; font-family: inherit;
            padding: 14px 35px; border-radius: 50px; font-size: 16px; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(129, 162, 132, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn:hover { background: #6b8c6e; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(129, 162, 132, 0.4); }

        /* 画廊 */
        .gallery {
            position: relative; z-index: 10; column-count: 3; column-gap: 25px;
            padding: 20px 30px 60px; max-width: 1200px; margin: 0 auto;
        }
        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; padding: 15px; } }

        .card {
            break-inside: avoid; margin-bottom: 25px; background: #fff; padding: 10px 10px 20px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .card:hover { transform: translateY(-6px); box-shadow: 0 15px 35px rgba(129, 162, 132, 0.15); }
        .card img { width: 100%; display: block; border-radius: 12px; }
        .card-info { padding-top: 15px; text-align: center; }
        .card-title { margin: 0; font-size: 16px; font-weight: bold; }
        .card-author { margin: 6px 0 0; font-size: 13px; color: var(--text-muted); }

        /* 弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 45, 0.4); backdrop-filter: blur(6px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-box {
            background: white; padding: 40px; border-radius: 30px; width: 85%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); transform: translateY(20px) scale(0.95); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }
        .modal-box h3 { margin: 0 0 25px 0; color: var(--sage-green); font-size: 20px; letter-spacing: 2px;}
        .input-box {
            width: 100%; box-sizing: border-box; padding: 15px; margin-bottom: 15px; border: 1px solid var(--mint-light); border-radius: 15px;
            background: var(--bg-paper); color: var(--text-dark); font-family: inherit; font-size: 15px; text-align: center; outline: none; transition: border-color 0.3s;
        }
        .input-box:focus { border-color: var(--sage-green); }

        /* =========================================
           新功能：悬浮音乐播放器按钮
           ========================================= */
        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 50px;
            height: 50px;
            background: var(--sage-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(129, 162, 132, 0.4);
            color: white;
            font-size: 22px;
            /* 一直旋转的动画 */
            animation: spin 4s linear infinite;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        /* 当处于暂停状态时，停止旋转，颜色变灰 */
        .music-player.paused {
            animation-play-state: paused;
            background: var(--text-muted);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .music-player:hover { transform: scale(1.1); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-fx"></div>

    <header>
        <h1>夏日十四行诗</h1>
        <div class="poetry-card">
            <div class="poetry-en">"Shall I compare thee to a summer's day? <br> Thou art more lovely and more temperate..."</div>
            <div class="poetry-zh">我怎么能够将你比作夏天？<br>你比夏天更美丽温婉。</div>
        </div>
        <button class="btn" onclick="toggleModal(true)">封存夏日时光</button>
    </header>

    <main class="gallery">
        <div class="card">
            <img src="https://picsum.photos/400/300?random=1" alt="照片">
            <div class="card-info">
                <p class="card-title">树荫下的微风</p>
                <p class="card-author">—— 记录者：老王</p>
            </div>
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/450?random=2" alt="照片">
            <div class="card-info">
                <p class="card-title">冰镇西瓜的甜</p>
                <p class="card-author">—— 记录者：小红</p>
            </div>
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/280?random=3" alt="照片">
            <div class="card-info">
                <p class="card-title">夏夜晚风</p>
                <p class="card-author">—— 记录者：张三</p>
            </div>
        </div>
    </main>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-box">
            <h3>致夏日的信</h3>
            <input type="file" id="photoFile" accept="image/*" class="input-box" style="padding: 12px; border-style: dashed;">
            <input type="text" id="photoTitle" placeholder="为这页回忆写下标题..." class="input-box">
            <input type="text" id="uploaderName" placeholder="你的署名" class="input-box">
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="btn" style="background: transparent; color: var(--text-muted); box-shadow: none;" onclick="toggleModal(false)">收起笔墨</button>
                <button class="btn" onclick="submitPhoto(event)">投递</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="xuni.mp3" type="audio/mpeg">
    </audio>
    
    <div id="musicBtn" class="music-player paused" onclick="toggleMusic()" title="播放/暂停音乐">
        🎵
    </div>

    <script>
        // --- 夏日特效 ---
        const frag = document.createDocumentFragment(); 
        const colors = ['#81A284', '#A3BCA6', '#E8F0E6']; 
        for (let i = 0; i < 30; i++) {
            let leaf = document.createElement('i');
            leaf.className = 'leaf';
            let size = Math.random() * 8 + 6; 
            leaf.style.width = size + 'px';
            leaf.style.height = size + 'px';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.background = colors[Math.floor(Math.random() * colors.length)];
            leaf.style.animationDuration = (Math.random() * 6 + 6) + 's';
            leaf.style.animationDelay = (Math.random() * 5) + 's';
            frag.appendChild(leaf);
        }
        document.getElementById('bg-fx').appendChild(frag); 

        // --- 音乐播放控制逻辑 ---
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.classList.remove('paused'); // 移除暂停状态，开始旋转变绿
            } else {
                bgMusic.pause();
                musicBtn.classList.add('paused'); // 加上暂停状态，停止旋转变灰
            }
        }

        // --- 图片压缩逻辑 ---
        async function compressImage(file, maxWidth = 1200, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let targetWidth = img.width;
                        let targetHeight = img.height;
                        if (targetWidth > maxWidth) {
                            targetHeight = Math.round(targetHeight * (maxWidth / targetWidth));
                            targetWidth = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = targetWidth;
                        canvas.height = targetHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                        canvas.toBlob((blob) => {
                            const newFileName = file.name.replace(/\.[^/.]+$/, "") + ".webp";
                            resolve(new File([blob], newFileName, { type: 'image/webp' }));
                        }, 'image/webp', quality);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // --- 弹窗与上传 ---
        const modal = document.getElementById('uploadModal');
        const uploaderNameInput = document.getElementById('uploaderName');

        function toggleModal(show) {
            if(show) {
                modal.classList.add('show');
                const savedName = localStorage.getItem('myNickname');
                if (savedName) uploaderNameInput.value = savedName;
            } else {
                modal.classList.remove('show');
            }
        }

        async function submitPhoto(event) {
            const fileInput = document.getElementById('photoFile');
            const title = document.getElementById('photoTitle').value;
            const name = uploaderNameInput.value;
            const submitBtn = event.target; 
            
            if(!fileInput.files[0]) return alert("信封里怎么能没有照片呢？");
            if(!title) return alert("为这页回忆写个标题吧。");
            if(!name) return alert("请留下你的署名。");

            localStorage.setItem('myNickname', name);
            
            try {
                submitBtn.innerText = "正在施展压缩魔法..."; 
                submitBtn.disabled = true; 
                
                const originalFile = fileInput.files[0];
                const finalFile = await compressImage(originalFile);
                
                submitBtn.innerText = "正在飞向云端...";
                
                // 模拟网络延迟
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                alert(`✅ 魔法成功！\n稍后我们把这里换成 Supabase 的真实上传代码！`);
                toggleModal(false);
                fileInput.value = ''; document.getElementById('photoTitle').value = '';
                
            } catch (error) {
                alert("糟糕，魔法失灵了，请重试！");
                console.error(error);
            } finally {
                submitBtn.innerText = "投递";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
