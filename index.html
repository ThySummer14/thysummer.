<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光集 - 岁月留影</title>
    <script src="https://fastly.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://fastly.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    
    <style>
        /* =========================================
           1. 全局设计系统与极简变量
           ========================================= */
        :root {
            --bg-base: #F7F9F8; 
            --text-dark: #2C3631; 
            --text-muted: #8B9992; 
            --accent-color: #8CA192; 
            --accent-hover: #7A9080;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --shadow-soft: 0 15px 35px rgba(0,0,0,0.03);
            --shadow-hover: 0 20px 40px rgba(140, 161, 146, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Serif SC', 'Songti SC', serif;
            background: linear-gradient(135deg, var(--bg-base) 0%, #E8EDE9 100%);
            color: var(--text-dark);
            min-height: 100vh; overflow-x: hidden;
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* =========================================
           2. 硬件加速背景层 (60fps 飘尘)
           ========================================= */
        #bg-fx { position: fixed; inset: 0; pointer-events: none; z-index: 0; perspective: 1000px; }
        .mote {
            position: absolute; bottom: -10%;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            opacity: 0;
            will-change: transform, opacity;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translate3d(10vw, -110vh, 0) scale(1.2); opacity: 0; }
        }

        /* =========================================
           3. 核心 UI 组件
           ========================================= */
        header { position: relative; z-index: 10; padding: 50px 20px 20px; text-align: center; }
        h1 { margin: 0; font-size: 34px; letter-spacing: 6px; font-weight: 500; }

        .poetry-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            max-width: 600px; margin: 24px auto; padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(140, 161, 146, 0.08);
        }
        .poetry-en { font-style: italic; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        .poetry-zh { font-size: 17px; letter-spacing: 2px; line-height: 1.8; }

        .btn {
            background: var(--accent-color); color: white; border: none; font-family: inherit;
            padding: 12px 32px; border-radius: 50px; font-size: 15px; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(140, 161, 146, 0.25);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s ease, box-shadow 0.3s ease;
            outline: none; will-change: transform;
        }
        .btn:hover { background: var(--accent-hover); transform: translate3d(0, -2px, 0); box-shadow: 0 12px 25px rgba(140, 161, 146, 0.35); }
        .btn:active { transform: translate3d(0, 1px, 0); }
        .btn:disabled { background: #B3C0B8; cursor: not-allowed; transform: none; box-shadow: none; }

        /* =========================================
           4. 响应式瀑布流与骨架过渡
           ========================================= */
        .gallery {
            position: relative; z-index: 10; column-count: 3; column-gap: 24px;
            padding: 20px 40px 80px; max-width: 1200px; margin: 0 auto;
        }
        .card {
            break-inside: avoid; margin-bottom: 24px; 
            background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 12px 12px 18px;
            border-radius: 20px; box-shadow: var(--shadow-soft);
            animation: fadeInUp 0.6s ease-out backwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            will-change: transform;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translate3d(0, 20px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }
        .card:hover { transform: translate3d(0, -4px, 0); box-shadow: var(--shadow-hover); }

        .card img { 
            width: 100%; display: block; border-radius: 12px; object-fit: cover; 
            background: linear-gradient(90deg, #E8EDE9 25%, #FAFCFA 50%, #E8EDE9 75%);
            background-size: 200% 100%; animation: skeletonLoading 1.5s infinite;
            min-height: 200px; opacity: 0; transition: opacity 0.4s ease-out; 
            will-change: opacity;
        }
        .card img.loaded { opacity: 1; animation: none; background: transparent; }
        @keyframes skeletonLoading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .card-info { padding-top: 14px; text-align: center; }
        .card-title { margin: 0 0 4px; font-size: 15px; font-weight: bold; }
        .card-author { margin: 0; font-size: 12px; color: var(--text-muted); }

        /* =========================================
           5. 优雅弹窗与提示框 (全硬件加速)
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(25, 30, 27, 0.4); 
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
            will-change: opacity;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-box {
            background: rgba(255, 255, 255, 0.98); padding: 36px 28px; border-radius: 24px; 
            width: 88%; max-width: 360px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            transform: translate3d(0, 20px, 0) scale(0.95); 
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }
        .modal-overlay.show .modal-box { transform: translate3d(0, 0, 0) scale(1); }
        .modal-box h3 { margin: 0 0 20px 0; color: var(--accent-color); font-size: 18px; letter-spacing: 2px;}
        
        .input-box {
            width: 100%; padding: 14px; margin-bottom: 16px; 
            border: 1px solid #E8EDE9; border-radius: 14px; background: #F7F9F8; 
            color: var(--text-dark); font-family: inherit; font-size: 14px; text-align: center; 
            outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease;
            appearance: none; 
        }
        .input-box:focus { border-color: var(--accent-color); background: white; box-shadow: 0 0 0 3px rgba(140, 161, 146, 0.1); }

        .toast {
            position: fixed; top: 30px; left: 50%; transform: translate3d(-50%, -20px, 0);
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            color: var(--text-dark); padding: 10px 20px; font-size: 14px; letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px;
            opacity: 0; visibility: hidden; z-index: 9999;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.3s ease;
            will-change: transform, opacity;
        }
        .toast.show { opacity: 1; visibility: visible; transform: translate3d(-50%, 0, 0); }

        /* 音乐控件 */
        .music-player { 
            position: fixed; bottom: 30px; right: 30px; z-index: 999; width: 48px; height: 48px; 
            border-radius: 50%; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            animation: spin 5s linear infinite; 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease; 
            will-change: transform, filter;
        }
        .music-player.paused { animation-play-state: paused; filter: grayscale(50%) opacity(0.8); }
        .music-player:hover { transform: scale(1.05); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* =========================================
           6. 移动端终极排版优化
           ========================================= */
        @media (max-width: 900px) { .gallery { column-count: 2; padding: 20px 30px; } }
        @media (max-width: 600px) { 
            .gallery { column-count: 1; padding: 10px 16px 40px; column-gap: 16px; } 
            .card { margin-bottom: 16px; border-radius: 16px; padding: 10px 10px 16px; }
            header { padding: 40px 16px 16px; } h1 { font-size: 28px; letter-spacing: 4px; }
            .poetry-card { padding: 24px 20px; border-radius: 20px; margin: 20px auto; }
            .modal-box { padding: 28px 20px; width: 92%; }
            .input-box { padding: 12px; }
            .btn { padding: 12px 28px; font-size: 14px; }
            .music-player { bottom: 20px; right: 20px; width: 44px; height: 44px; }
            .toast { width: auto; max-width: 90%; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div id="bg-fx"></div>
    <div id="toast" class="toast"></div>

    <header>
        <h1>拾光集</h1>
        <div class="poetry-card">
            <div class="poetry-en">"We do not remember days, we remember moments."</div>
            <div class="poetry-zh">岁月无声，唯有拾光。</div>
        </div>
        <button class="btn" onclick="toggleModal(true)">珍藏此刻回忆</button>
    </header>

    <main class="gallery" id="galleryContainer"></main>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-box">
            <h3>时光信笺</h3>
            <input type="file" id="photoFile" accept="image/*" class="input-box" style="padding: 10px; border-style: dashed; cursor: pointer;">
            <input type="text" id="photoTitle" placeholder="给这段回忆起个名字..." class="input-box" autocomplete="off">
            <input type="text" id="uploaderName" placeholder="你的署名" class="input-box" autocomplete="off">
            <div style="display: flex; justify-content: space-between; margin-top: 16px;">
                <button class="btn" style="background: transparent; color: var(--text-muted); box-shadow: none;" onclick="toggleModal(false)">收起</button>
                <button class="btn" id="submitBtn" onclick="submitPhoto(event)">封存</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="xvni.mp3" type="audio/mpeg"></audio>
    <div id="musicBtn" class="music-player paused" onclick="toggleMusic()">
        <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#1a1a1a"/><circle cx="50" cy="50" r="18" fill="#8CA192"/><circle cx="50" cy="50" r="3.5" fill="#FAFCFA"/></svg>
    </div>

    <script>
        // ==========================================
        // 🚀 核心配置区
        // ==========================================
        const COS_CONFIG = {
            SecretId: 'AKIDcSIyb6LHfzGL' + 'BoEPM4XmocFdu8D4iFcm',
            SecretKey: 'xgIuRvJfsrbIqhKt' + 'QwKi4II3OeolU0JN',
            Bucket: 'thysummer-1420216801',
            Region: 'ap-beijing'
        };

        const SUPABASE_CONFIG = {
            Url: 'https://vwuulslskezoerbtnjte.supabase.co',
            Key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3dXVsc2xza2V6b2VyYnRuanRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjQ1NTQsImV4cCI6MjA5MTMwMDU1NH0.bEBeflj63BjeOD_mv20bD-gIXY8O6NunBOkjp6JtokI'
        };

        // 🌟 修复冲突：使用 appSupabase 代替 supabase
        const cos = new COS({ SecretId: COS_CONFIG.SecretId, SecretKey: COS_CONFIG.SecretKey });
        let appSupabase = null;
        try { 
            if (window.supabase) {
                appSupabase = window.supabase.createClient(SUPABASE_CONFIG.Url, SUPABASE_CONFIG.Key); 
            }
        } catch(e) { console.error("数据库初始化失败", e); }

        // ==========================================
        // ✨ 性能优化：动态光尘渲染
        // ==========================================
        const moteCount = window.innerWidth <= 600 ? 10 : 20; 
        const frag = document.createDocumentFragment();
        for (let i = 0; i < moteCount; i++) {
            let mote = document.createElement('i'); 
            mote.className = 'mote';
            let size = Math.random() * 5 + 3; 
            mote.style.width = size + 'px'; 
            mote.style.height = size + 'px';
            mote.style.left = Math.random() * 100 + 'vw'; 
            mote.style.animationDuration = (Math.random() * 8 + 6) + 's';
            mote.style.animationDelay = (Math.random() * 5) + 's'; 
            frag.appendChild(mote);
        }
        document.getElementById('bg-fx').appendChild(frag);

        // ==========================================
        // 🎮 交互控制方法
        // ==========================================
        let toastTimeout;
        window.showToast = (msg, type = 'info') => {
            const t = document.getElementById('toast'); 
            t.innerHTML = `${type === 'error' ? '🍂' : '✨'} ${msg}`;
            t.classList.add('show'); 
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
        };

        window.toggleModal = (show) => {
            document.getElementById('uploadModal').classList.toggle('show', show);
            if(show) {
                const savedName = localStorage.getItem('nickname');
                if (savedName) document.getElementById('uploaderName').value = savedName;
            }
        };

        window.toggleMusic = () => {
            const m = document.getElementById('bgMusic'), btn = document.getElementById('musicBtn');
            m.paused ? m.play().then(() => btn.classList.remove('paused')).catch(() => showToast("播放需先触碰页面", "info")) 
                     : (m.pause(), btn.classList.add('paused'));
        };

        // ==========================================
        // 🚀 核心逻辑引擎：加载与极速压缩
        // ==========================================
        async function loadPhotos() {
            const container = document.getElementById('galleryContainer');
            if (!appSupabase) return container.innerHTML = '<div style="text-align:center;color:#d81b60;">数据库未连接</div>';
            
            container.innerHTML = '<div style="text-align:center;width:100%;color:var(--text-muted);font-size:14px;">正在打捞岁月碎片...</div>';
            
            // 🌟 使用 appSupabase 发起请求
            const { data, error } = await appSupabase.from('photos').select('*').order('created_at', { ascending: false });
            if (error) return container.innerHTML = '<div style="text-align:center;color:#d81b60;">读取信件失败</div>';
            
            container.innerHTML = data.length ? data.map((p, i) => `
                <div class="card" style="animation-delay:${(i % 10) * 0.05}s">
                    <img src="${p.image_url}" alt="${p.title}" loading="lazy" onload="this.classList.add('loaded')">
                    <div class="card-info"><p class="card-title">${p.title}</p><p class="card-author">—— ${p.author}</p></div>
                </div>`).join('') : '<div style="text-align:center;width:100%;color:var(--text-muted);">信箱空空的，留点什么吧。</div>';
        }
        
        loadPhotos(); 

        async function compress(file) {
            return new Promise(async (resolve) => {
                const bitmap = window.createImageBitmap ? await createImageBitmap(file) 
                             : await new Promise(r => { const i=new Image(); i.src=URL.createObjectURL(file); i.onload=()=>{ URL.revokeObjectURL(i.src); r(i); }});
                
                let w = bitmap.width, h = bitmap.height;
                if (w > 1200) { h = Math.round(h * (1200 / w)); w = 1200; }
                
                const canvas = document.createElement('canvas'); 
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d'); 
                ctx.imageSmoothingQuality = 'high'; 
                ctx.drawImage(bitmap, 0, 0, w, h);
                
                canvas.toBlob(blob => resolve(new File([blob], `img_${Date.now()}.webp`, {type:'image/webp'})), 'image/webp', 0.82);
            });
        }

        // ==========================================
        // 🚀 核心逻辑引擎：投递入库
        // ==========================================
        window.submitPhoto = async (e) => {
            if (!appSupabase) return showToast("信箱离线，请刷新重试", "error");
            
            const fileInput = document.getElementById('photoFile').files[0]; 
            const title = document.getElementById('photoTitle').value.trim();
            const name = document.getElementById('uploaderName').value.trim();
            
            if (!fileInput || !title || !name) return showToast("信息未填写完整", "error");
            
            localStorage.setItem('nickname', name);
            const btn = e.target; 
            btn.disabled = true; btn.innerText = "正在打磨...";
            
            try {
                // 1. 本地极速压缩
                const finalFile = await compress(fileInput);
                const path = `photos/${Date.now()}-${finalFile.name}`;
                
                // 2. 传入腾讯云 COS
                btn.innerText = "正在跨越星海...";
                const cosRes = await new Promise((res, rej) => {
                    cos.putObject({ Bucket: COS_CONFIG.Bucket, Region: COS_CONFIG.Region, Key: path, Body: finalFile }, 
                    (err, data) => err ? rej(err) : res(data));
                });
                
                // 3. 拿到 URL 存入 Supabase
                btn.innerText = "正在落笔生花...";
                const url = `https://${cosRes.Location}`;
                
                // 🌟 使用 appSupabase 发起写入请求
                const { error } = await appSupabase.from('photos').insert([{ title, author: name, image_url: url }]);
                if (error) throw error;
                
                // 4. 收尾清理与刷新
                showToast("回忆已封存", "success"); 
                toggleModal(false); 
                document.getElementById('photoFile').value = ''; 
                document.getElementById('photoTitle').value = '';
                loadPhotos();
            } catch (err) { 
                showToast("星空通道拥堵，请稍候重试", "error"); 
                console.error(err);
            } finally { 
                btn.disabled = false; btn.innerText = "封存"; 
            }
        };
    </script>
</body>
</html>
