<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日十四行诗</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* =========================================
           1. 极简夏日美学变量
           ========================================= */
        :root {
            --bg-base: #F4F9F4; 
            --text-dark: #2A3B2C; 
            --text-muted: #829A84; 
            --accent-green: #739E77; 
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: linear-gradient(135deg, var(--bg-base) 0%, #EAF2EA 100%);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* =========================================
           2. 满血 GPU 硬件加速飘落特效
           ========================================= */
        #bg-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            perspective: 1000px;
        }
        .leaf {
            position: absolute; top: -10%;
            background: var(--accent-green);
            border-radius: 50% 0 50% 0;
            opacity: 0;
            will-change: transform, opacity;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translate3d(0, -50px, 0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.4; }
            85% { opacity: 0.4; }
            100% { transform: translate3d(20vw, 110vh, 0) rotate(360deg); opacity: 0; }
        }

        /* =========================================
           3. 高级毛玻璃排版 (Glassmorphism)
           ========================================= */
        header { position: relative; z-index: 10; padding: 60px 20px 30px; text-align: center; }
        h1 { margin: 0; font-size: 34px; letter-spacing: 6px; color: var(--accent-green); font-weight: bold; text-shadow: 0 2px 10px rgba(115, 158, 119, 0.2); }

        .poetry-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            max-width: 680px; margin: 35px auto; padding: 45px 35px;
            border-radius: 40px; 
            box-shadow: 0 25px 50px rgba(115, 158, 119, 0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            position: relative;
        }
        .poetry-en { font-style: italic; font-size: 15px; color: var(--text-muted); margin-bottom: 15px;}
        .poetry-zh { font-size: 19px; letter-spacing: 3px; color: var(--text-dark); line-height: 1.9;}

        .btn {
            background: var(--accent-green); color: white; border: none; font-family: inherit;
            padding: 15px 40px; border-radius: 50px; font-size: 16px; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(115, 158, 119, 0.35);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            -webkit-tap-highlight-color: transparent; /* 消除手机端点击蓝光 */
        }
        .btn:hover { background: #5c8460; transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 35px rgba(115, 158, 119, 0.45); }
        .btn:active { transform: translateY(0) scale(0.98); }
        .btn:disabled { background: #A9BCA9; cursor: not-allowed; transform: none; box-shadow: none; }

        /* =========================================
           4. 流畅的瀑布流画廊与✨骨架屏过渡✨
           ========================================= */
        .gallery {
            position: relative; z-index: 10; column-count: 3; column-gap: 30px;
            padding: 20px 40px 80px; max-width: 1200px; margin: 0 auto;
        }
        .card {
            break-inside: avoid; margin-bottom: 30px; 
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 12px 12px 24px;
            border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            animation: fadeInUp 0.8s ease-out backwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translate3d(0, 30px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }
        .card:hover { transform: translate3d(0, -8px, 0); box-shadow: 0 25px 45px rgba(115, 158, 119, 0.15); }

        /* 骨架屏与渐显核心逻辑 */
        .card img { 
            width: 100%; display: block; border-radius: 16px; object-fit: cover; 
            background: linear-gradient(90deg, #EAF2EA 25%, #FAFCFA 50%, #EAF2EA 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            min-height: 200px; /* 占位防止跳动 */
            opacity: 0; transition: opacity 0.6s ease-out; 
        }
        .card img.loaded {
            opacity: 1; animation: none; background: transparent;
        }
        @keyframes skeletonLoading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .card-info { padding-top: 18px; text-align: center; }
        .card-title { margin: 0; font-size: 17px; font-weight: bold; color: var(--text-dark); }
        .card-author { margin: 8px 0 0; font-size: 14px; color: var(--text-muted); }

        /* =========================================
           5. 呼吸感弹窗
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 30, 22, 0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.4s ease;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-box {
            background: rgba(255, 255, 255, 0.95); padding: 45px 35px; border-radius: 35px; 
            width: 85%; max-width: 400px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); 
            transform: translate3d(0, 30px, 0) scale(0.95); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-box { transform: translate3d(0, 0, 0) scale(1); }
        .modal-box h3 { margin: 0 0 30px 0; color: var(--accent-green); font-size: 22px; letter-spacing: 2px;}
        
        .input-box {
            width: 100%; box-sizing: border-box; padding: 16px; margin-bottom: 18px; 
            border: 2px solid #E8F0E6; border-radius: 18px;
            background: #FAFCFA; color: var(--text-dark); font-family: inherit; font-size: 15px; text-align: center; 
            outline: none; transition: all 0.3s ease;
        }
        .input-box:focus { border-color: var(--accent-green); background: white; box-shadow: 0 0 0 4px rgba(115, 158, 119, 0.1); }

        /* =========================================
           6. 极致丝滑的黑胶唱片
           ========================================= */
        .music-player {
            position: fixed; bottom: 35px; right: 35px; z-index: 999;
            width: 58px; height: 58px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            will-change: transform, filter; -webkit-transform: translateZ(0); transform: translateZ(0);
            animation: spin 5s linear infinite;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s ease;
        }
        .music-player svg { width: 100%; height: 100%; display: block; }
        .music-player.paused { animation-play-state: paused; filter: grayscale(50%) brightness(0.85); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15); }
        .music-player:hover { transform: scale(1.15) translateZ(0); }
        @keyframes spin { 0% { transform: rotate(0deg) translateZ(0); } 100% { transform: rotate(360deg) translateZ(0); } }

        /* =========================================
           ✨核心升级：移动端极致排版优化✨
           ========================================= */
        @media (max-width: 900px) { 
            .gallery { column-count: 2; padding: 20px 30px; } 
        }
        @media (max-width: 600px) { 
            .gallery { column-count: 1; padding: 10px 15px 40px; column-gap: 15px; } 
            header { padding: 45px 15px 20px; }
            h1 { font-size: 28px; letter-spacing: 4px; }
            .poetry-card { padding: 30px 20px; margin: 20px auto; border-radius: 30px; }
            .poetry-zh { font-size: 16px; line-height: 1.7; }
            .poetry-en { font-size: 13px; }
            .btn { padding: 12px 30px; font-size: 15px; }
            .modal-box { padding: 35px 25px; width: 90%; border-radius: 30px; }
            .input-box { padding: 14px; font-size: 14px; }
            .music-player { bottom: 25px; right: 25px; width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div id="bg-fx"></div>

    <header>
        <h1>夏日十四行诗</h1>
        <div class="poetry-card">
            <div class="poetry-en">"Shall I compare thee to a summer's day? <br> Thou art more lovely and more temperate..."</div>
            <div class="poetry-zh">我怎么能够将你比作夏天？<br>你比夏天更美丽温婉。</div>
        </div>
        <button class="btn" onclick="toggleModal(true)">封存夏日时光</button>
    </header>

    <main class="gallery" id="galleryContainer">
        </main>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-box">
            <h3>致夏日的信</h3>
            <input type="file" id="photoFile" accept="image/*" class="input-box" style="padding: 12px; border-style: dashed; cursor: pointer;">
            <input type="text" id="photoTitle" placeholder="为这页回忆写下标题..." class="input-box">
            <input type="text" id="uploaderName" placeholder="你的署名" class="input-box">
            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <button class="btn" style="background: transparent; color: var(--text-muted); box-shadow: none;" onclick="toggleModal(false)">收起笔墨</button>
                <button class="btn" onclick="submitPhoto(event)">投递</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="xvni.mp3" type="audio/mpeg">
    </audio>
    
    <div id="musicBtn" class="music-player paused" onclick="toggleMusic()" title="播放/暂停音乐">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="49" fill="#1a1a1a" />
            <circle cx="50" cy="50" r="43" fill="none" stroke="#2a2a2a" stroke-width="1.5" />
            <circle cx="50" cy="50" r="37" fill="none" stroke="#333333" stroke-width="1" />
            <circle cx="50" cy="50" r="31" fill="none" stroke="#252525" stroke-width="1.5" />
            <circle cx="50" cy="50" r="25" fill="none" stroke="#3a3a3a" stroke-width="1" />
            <circle cx="50" cy="50" r="18" fill="#739E77" />
            <circle cx="50" cy="50" r="14" fill="none" stroke="#FAFCFA" stroke-width="0.5" opacity="0.6"/>
            <circle cx="50" cy="50" r="3.5" fill="#FAFCFA" />
        </svg>
    </div>

    <script>
        // ==========================================
        // 🚀 初始化 Supabase (内嵌了你的真实配置)
        // ==========================================
        let appSupabase = null;
        try {
            const SUPABASE_URL = 'https://vwuulslskezoerbtnjte.supabase.co'; 
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3dXVsc2xza2V6b2VyYnRuanRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjQ1NTQsImV4cCI6MjA5MTMwMDU1NH0.bEBeflj63BjeOD_mv20bD-gIXY8O6NunBOkjp6JtokI';
            
            if (window.supabase) {
                appSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (error) {
            console.error("初始化出错:", error);
        }

        // ==========================================
        // ✨ 优化：动态响应式的夏日飘落特效
        // ==========================================
        // 手机端自动降级叶子数量，防止掉帧发热
        const isMobile = window.innerWidth <= 600;
        const leafCount = isMobile ? 12 : 25; 

        const frag = document.createDocumentFragment(); 
        const colors = ['#739E77', '#A3BCA6', '#EAF2EA']; 
        for (let i = 0; i < leafCount; i++) { 
            let leaf = document.createElement('i');
            leaf.className = 'leaf';
            let size = Math.random() * 8 + 6; 
            leaf.style.width = size + 'px';
            leaf.style.height = size + 'px';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.background = colors[Math.floor(Math.random() * colors.length)];
            leaf.style.animationDuration = (Math.random() * 5 + 7) + 's';
            leaf.style.animationDelay = (Math.random() * 5) + 's';
            frag.appendChild(leaf);
        }
        document.getElementById('bg-fx').appendChild(frag); 

        // ==========================================
        // 交互功能逻辑
        // ==========================================
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        
        function toggleMusic() {
            if (bgMusic.paused) {
                let playPromise = bgMusic.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => { musicBtn.classList.remove('paused'); })
                    .catch(() => { console.warn("音频需要用户交互后播放"); });
                }
            } else {
                bgMusic.pause();
                musicBtn.classList.add('paused');
            }
        }

        const modal = document.getElementById('uploadModal');
        const uploaderNameInput = document.getElementById('uploaderName');

        function toggleModal(show) {
            if(show) {
                modal.classList.add('show');
                const savedName = localStorage.getItem('myNickname');
                if (savedName) uploaderNameInput.value = savedName;
            } else { 
                modal.classList.remove('show'); 
            }
        }

        // ==========================================
        // ✨ 优化：支持懒加载与过渡动画的瀑布流
        // ==========================================
        const galleryContainer = document.getElementById('galleryContainer');
        
        async function loadPhotos() {
            if (!appSupabase) return; 
            galleryContainer.innerHTML = '<div style="text-align: center; width: 100%; padding: 40px; color: var(--text-muted); font-size: 16px;">正在翻阅夏日日记...</div>';
            try {
                const { data, error } = await appSupabase.from('photos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                galleryContainer.innerHTML = '';
                if (data.length === 0) {
                    galleryContainer.innerHTML = '<div style="text-align: center; width: 100%; padding: 40px; color: var(--text-muted); font-size: 16px;">日记本还是空的，快去封存第一页夏日时光吧！</div>';
                    return;
                }
                data.forEach((photo, index) => {
                    const delay = index * 0.1; 
                    // 核心：loading="lazy" 性能优化，onload="this.classList.add('loaded')" 触发渐显
                    const cardHtml = `
                        <div class="card" style="animation-delay: ${delay}s">
                            <img src="${photo.image_url}" alt="${photo.title}" loading="lazy" onload="this.classList.add('loaded')">
                            <div class="card-info">
                                <p class="card-title">${photo.title}</p>
                                <p class="card-author">—— 记录者：${photo.author}</p>
                            </div>
                        </div>
                    `;
                    galleryContainer.innerHTML += cardHtml;
                });
            } catch (error) {
                galleryContainer.innerHTML = '<div style="text-align: center; width: 100%; padding: 40px; color: #d81b60;">糟糕，日记本卡住了，请刷新重试。</div>';
            }
        }
        
        loadPhotos();

        // ==========================================
        // ✨ 优化：后台线程图像解码 (解决主线程卡顿)
        // ==========================================
        async function compressImage(file, maxWidth = 1200, quality = 0.8) {
            return new Promise(async (resolve, reject) => {
                try {
                    let imgBitmap;
                    // 使用先进的 createImageBitmap API 移交解码工作给 GPU/后台线程
                    if (window.createImageBitmap) {
                        imgBitmap = await createImageBitmap(file);
                    } else {
                        // 兼容老浏览器的降级方案
                        imgBitmap = await new Promise((res, rej) => {
                            const img = new Image();
                            img.src = URL.createObjectURL(file);
                            img.onload = () => { URL.revokeObjectURL(img.src); res(img); };
                            img.onerror = rej;
                        });
                    }

                    let targetWidth = imgBitmap.width;
                    let targetHeight = imgBitmap.height;

                    if (targetWidth > maxWidth) { 
                        targetHeight = Math.round(targetHeight * (maxWidth / targetWidth)); 
                        targetWidth = maxWidth; 
                    }

                    const canvas = document.createElement('canvas'); 
                    canvas.width = targetWidth; 
                    canvas.height = targetHeight;
                    const ctx = canvas.getContext('2d'); 
                    
                    // 启用高质量抗锯齿，保证图片质感
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    
                    ctx.drawImage(imgBitmap, 0, 0, targetWidth, targetHeight);
                    
                    if (imgBitmap.close) imgBitmap.close(); // 及时释放内存

                    canvas.toBlob((blob) => { 
                        resolve(new File([blob], `img_${Date.now()}.webp`, { type: 'image/webp' })); 
                    }, 'image/webp', quality);
                    
                } catch (error) {
                    reject(error);
                }
            });
        }

        // ==========================================
        // 核心投递逻辑
        // ==========================================
        async function submitPhoto(event) {
            if (!appSupabase) return alert("数据库连接失败，请检查网络！");
            const fileInput = document.getElementById('photoFile'), title = document.getElementById('photoTitle').value, name = uploaderNameInput.value, submitBtn = event.target; 
            
            if(!fileInput.files[0]) return alert("信封里怎么能没有照片呢？");
            if(!title) return alert("为这页回忆写个标题吧。");
            if(!name) return alert("请留下你的署名。");

            localStorage.setItem('myNickname', name);
            try {
                submitBtn.innerText = "正在施展压缩魔法..."; submitBtn.disabled = true; 
                
                // 此处的压缩现在对主线程零负担
                const finalFile = await compressImage(fileInput.files[0]);
                submitBtn.innerText = "正在飞向云端...";
                
                const { error: uploadError } = await appSupabase.storage.from('gallery').upload(finalFile.name, finalFile);
                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = appSupabase.storage.from('gallery').getPublicUrl(finalFile.name);
                submitBtn.innerText = "正在写进日记本...";

                const { error: dbError } = await appSupabase.from('photos').insert([{ title: title, author: name, image_url: publicUrl }]);
                if (dbError) throw dbError;
                
                alert("✅ 投递成功！"); 
                toggleModal(false); 
                fileInput.value = ''; 
                document.getElementById('photoTitle').value = '';
                
                // 重新拉取展示，自动触发骨架屏
                loadPhotos();
            } catch (error) {
                alert("糟糕，投递失败了！网络出错了。");
                console.error("上传错误:", error);
            } finally {
                submitBtn.innerText = "投递"; submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
