<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光集 - 岁月留影</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* =========================================
           1. 拾光美学变量 (去季节化的温润色彩)
           ========================================= */
        :root {
            --bg-base: #F7F9F8; /* 更干净的纸张白 */
            --text-dark: #2C3631; /* 柔和的深灰绿 */
            --text-muted: #8B9992; 
            --accent-color: #8CA192; /* 高级晨雾青，四季皆宜 */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: linear-gradient(135deg, var(--bg-base) 0%, #E8EDE9 100%);
            color: var(--text-dark);
            min-height: 100vh; overflow-x: hidden;
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
           2. 时光光尘特效 (Stardust 替换绿叶)
           ========================================= */
        #bg-fx { position: fixed; inset: 0; pointer-events: none; z-index: 0; perspective: 1000px; }
        .mote {
            position: absolute; bottom: -10%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
            opacity: 0;
            will-change: transform, opacity;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translate3d(15vw, -110vh, 0) scale(1.2); opacity: 0; }
        }

        /* =========================================
           3. UI 组件与排版
           ========================================= */
        header { position: relative; z-index: 10; padding: 60px 20px 30px; text-align: center; }
        h1 { margin: 0; font-size: 36px; letter-spacing: 8px; color: var(--text-dark); font-weight: normal; }

        .poetry-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            max-width: 650px; margin: 30px auto; padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(140, 161, 146, 0.1), inset 0 0 0 1px rgba(255,255,255,0.5);
        }
        .poetry-en { font-style: italic; font-size: 15px; color: var(--text-muted); margin-bottom: 12px; }
        .poetry-zh { font-size: 18px; letter-spacing: 2px; line-height: 1.8; }

        .btn {
            background: var(--accent-color); color: white; border: none; font-family: inherit;
            padding: 14px 38px; border-radius: 50px; font-size: 15px; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(140, 161, 146, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            -webkit-tap-highlight-color: transparent; outline: none;
        }
        .btn:hover { background: #7A9080; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(140, 161, 146, 0.4); }
        .btn:active { transform: translateY(0) scale(0.97); }
        .btn:disabled { background: #B3C0B8; cursor: not-allowed; transform: none; box-shadow: none; }

        /* =========================================
           4. 瀑布流画廊与骨架屏
           ========================================= */
        .gallery {
            position: relative; z-index: 10; column-count: 3; column-gap: 25px;
            padding: 20px 40px 80px; max-width: 1200px; margin: 0 auto;
        }
        .card {
            break-inside: avoid; margin-bottom: 25px; 
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 10px 10px 20px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            animation: fadeInUp 0.8s ease-out backwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translate3d(0, 30px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }
        .card:hover { transform: translate3d(0, -6px, 0); box-shadow: 0 20px 40px rgba(140, 161, 146, 0.15); }

        .card img { 
            width: 100%; display: block; border-radius: 14px; object-fit: cover; 
            background: linear-gradient(90deg, #E8EDE9 25%, #FAFCFA 50%, #E8EDE9 75%);
            background-size: 200% 100%; animation: skeletonLoading 1.5s infinite;
            min-height: 200px; opacity: 0; transition: opacity 0.5s ease-out; 
        }
        .card img.loaded { opacity: 1; animation: none; background: transparent; }
        @keyframes skeletonLoading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .card-info { padding-top: 15px; text-align: center; }
        .card-title { margin: 0 0 6px; font-size: 16px; font-weight: bold; }
        .card-author { margin: 0; font-size: 13px; color: var(--text-muted); }

        /* =========================================
           5. 优雅弹窗与轻提示 (Toast)
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(25, 30, 27, 0.4); 
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-box {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px; border-radius: 28px; 
            width: 85%; max-width: 360px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); 
            transform: translate3d(0, 20px, 0) scale(0.95); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-box { transform: translate3d(0, 0, 0) scale(1); }
        .modal-box h3 { margin: 0 0 25px 0; color: var(--accent-color); font-size: 20px; letter-spacing: 2px;}
        
        .input-box {
            width: 100%; box-sizing: border-box; padding: 15px; margin-bottom: 15px; 
            border: 1px solid #E8EDE9; border-radius: 16px; background: #F7F9F8; 
            color: var(--text-dark); font-family: inherit; font-size: 14px; text-align: center; 
            outline: none; transition: all 0.3s ease;
        }
        .input-box:focus { border-color: var(--accent-color); background: white; box-shadow: 0 0 0 3px rgba(140, 161, 146, 0.1); }

        /* 极致丝滑的 Toast 提示 */
        .toast {
            position: fixed; top: 30px; left: 50%; transform: translate(-50%, -20px);
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            color: var(--text-dark); padding: 12px 24px; font-size: 14px; letter-spacing: 1px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px;
            opacity: 0; visibility: hidden; z-index: 9999;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }

        /* 音乐与响应式缩减... */
        .music-player { position: fixed; bottom: 30px; right: 30px; z-index: 999; width: 54px; height: 54px; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.15); will-change: transform, filter; animation: spin 5s linear infinite; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s ease; }
        .music-player.paused { animation-play-state: paused; filter: grayscale(40%) brightness(0.9); }
        .music-player:hover { transform: scale(1.1); }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) { .gallery { column-count: 2; padding: 20px 30px; } }
        @media (max-width: 600px) { 
            .gallery { column-count: 1; padding: 10px 20px 40px; column-gap: 20px; } 
            header { padding: 40px 15px 20px; } h1 { font-size: 30px; }
            .poetry-card { padding: 25px 20px; border-radius: 25px; }
            .btn { padding: 12px 32px; } .modal-box { padding: 30px 20px; }
            .music-player { bottom: 20px; right: 20px; width: 48px; height: 48px; }
            .toast { width: 80%; justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="bg-fx"></div>
    <div id="toast" class="toast"></div>

    <header>
        <h1>拾光集</h1>
        <div class="poetry-card">
            <div class="poetry-en">"We do not remember days, we remember moments."</div>
            <div class="poetry-zh">时光流转，岁月无言。<br>幸好有些瞬间，被永远定格。</div>
        </div>
        <button class="btn" onclick="toggleModal(true)">珍藏此刻回忆</button>
    </header>

    <main class="gallery" id="galleryContainer"></main>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-box">
            <h3>时光信笺</h3>
            <input type="file" id="photoFile" accept="image/*" class="input-box" style="padding: 10px; border-style: dashed; cursor: pointer;">
            <input type="text" id="photoTitle" placeholder="给这段回忆起个名字..." class="input-box">
            <input type="text" id="uploaderName" placeholder="你的署名" class="input-box">
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="btn" style="background: transparent; color: var(--text-muted); box-shadow: none;" onclick="toggleModal(false)">收起笔墨</button>
                <button class="btn" onclick="submitPhoto(event)">封存</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="xvni.mp3" type="audio/mpeg"></audio>
    
    <div id="musicBtn" class="music-player paused" onclick="toggleMusic()" title="音乐开关">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="49" fill="#1a1a1a" />
            <circle cx="50" cy="50" r="43" fill="none" stroke="#2a2a2a" stroke-width="1.5" />
            <circle cx="50" cy="50" r="31" fill="none" stroke="#252525" stroke-width="1.5" />
            <circle cx="50" cy="50" r="18" fill="#8CA192" />
            <circle cx="50" cy="50" r="3.5" fill="#FAFCFA" />
        </svg>
    </div>

    <script>
        // ==========================================
        // 🚀 初始化与全局工具
        // ==========================================
        let appSupabase = null;
        try {
            const SUPABASE_URL = 'https://vwuulslskezoerbtnjte.supabase.co'; 
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3dXVsc2xza2V6b2VyYnRuanRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjQ1NTQsImV4cCI6MjA5MTMwMDU1NH0.bEBeflj63BjeOD_mv20bD-gIXY8O6NunBOkjp6JtokI';
            if (window.supabase) appSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (error) { console.error("初始化出错"); }

        // 轻提示 Toast (替代所有 alert)
        let toastTimeout;
        window.showToast = function(msg, type = 'info') {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimeout);
            const icon = type === 'error' ? '🍂' : type === 'success' ? '✨' : '💡';
            toast.innerHTML = `${icon} ${msg}`;
            toast.classList.add('show');
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // ==========================================
        // ✨ 氛围特效：时光光尘 (Stardust)
        // ==========================================
        const leafCount = window.innerWidth <= 600 ? 12 : 25; 
        const frag = document.createDocumentFragment(); 
        for (let i = 0; i < leafCount; i++) { 
            let mote = document.createElement('i');
            mote.className = 'mote';
            let size = Math.random() * 6 + 4; 
            mote.style.width = size + 'px'; mote.style.height = size + 'px';
            mote.style.left = Math.random() * 100 + 'vw';
            mote.style.animationDuration = (Math.random() * 6 + 8) + 's';
            mote.style.animationDelay = (Math.random() * 5) + 's';
            frag.appendChild(mote);
        }
        document.getElementById('bg-fx').appendChild(frag); 

        // ==========================================
        // 交互控制
        // ==========================================
        const bgMusic = document.getElementById('bgMusic'), musicBtn = document.getElementById('musicBtn'), modal = document.getElementById('uploadModal'), uploaderNameInput = document.getElementById('uploaderName');
        
        window.toggleMusic = () => {
            if (bgMusic.paused) {
                bgMusic.play().then(() => musicBtn.classList.remove('paused')).catch(() => showToast("播放需要先与页面交互哦", "info"));
            } else { bgMusic.pause(); musicBtn.classList.add('paused'); }
        };

        window.toggleModal = (show) => {
            if(show) {
                modal.classList.add('show');
                if (localStorage.getItem('myNickname')) uploaderNameInput.value = localStorage.getItem('myNickname');
            } else modal.classList.remove('show'); 
        };

        // ==========================================
        // ✨ 数据渲染与瀑布流
        // ==========================================
        const galleryContainer = document.getElementById('galleryContainer');
        
        window.loadPhotos = async function() {
            if (!appSupabase) return; 
            galleryContainer.innerHTML = '<div style="text-align: center; width: 100%; padding: 40px; color: var(--text-muted);">正在打捞岁月碎片...</div>';
            try {
                const { data, error } = await appSupabase.from('photos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                if (data.length === 0) {
                    galleryContainer.innerHTML = '<div style="text-align: center; width: 100%; padding: 40px; color: var(--text-muted);">时光信箱还是空的，去珍藏第一页回忆吧 ✨</div>';
                    return;
                }
                galleryContainer.innerHTML = data.map((photo, i) => `
                    <div class="card" style="animation-delay: ${i * 0.05}s">
                        <img src="${photo.image_url}" alt="${photo.title}" loading="lazy" onload="this.classList.add('loaded')">
                        <div class="card-info">
                            <p class="card-title">${photo.title}</p>
                            <p class="card-author">—— 记录者：${photo.author}</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                galleryContainer.innerHTML = '<div style="text-align: center; color: #d81b60;">网络似乎走丢了，刷新试试吧。</div>';
            }
        };
        loadPhotos();

        // ==========================================
        // ✨ 极致后台压缩
        // ==========================================
        async function compressImage(file, maxWidth = 1200, quality = 0.8) {
            return new Promise(async (resolve, reject) => {
                try {
                    let imgBitmap = window.createImageBitmap ? await createImageBitmap(file) : await new Promise((res, rej) => {
                        const img = new Image(); img.src = URL.createObjectURL(file);
                        img.onload = () => { URL.revokeObjectURL(img.src); res(img); }; img.onerror = rej;
                    });
                    
                    let [w, h] = [imgBitmap.width, imgBitmap.height];
                    if (w > maxWidth) { h = Math.round(h * (maxWidth / w)); w = maxWidth; }

                    const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d'); 
                    canvas.width = w; canvas.height = h;
                    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(imgBitmap, 0, 0, w, h);
                    if (imgBitmap.close) imgBitmap.close();

                    canvas.toBlob(blob => resolve(new File([blob], `img_${Date.now()}.webp`, { type: 'image/webp' })), 'image/webp', quality);
                } catch (error) { reject(error); }
            });
        }

        // ==========================================
        // 核心封存逻辑
        // ==========================================
        window.submitPhoto = async function(event) {
            if (!appSupabase) return showToast("未能连接到云端信箱", "error");
            const fileInput = document.getElementById('photoFile'), title = document.getElementById('photoTitle').value, name = uploaderNameInput.value, submitBtn = event.target; 
            
            if(!fileInput.files[0]) return showToast("信封里怎么能没有照片呢？", "error");
            if(!title) return showToast("给这段回忆起个名字吧", "error");
            if(!name) return showToast("别忘了留下你的署名", "error");

            localStorage.setItem('myNickname', name);
            try {
                submitBtn.innerText = "正在压缩时光..."; submitBtn.disabled = true; 
                const finalFile = await compressImage(fileInput.files[0]);
                
                submitBtn.innerText = "正在跨越星海...";
                const { error: uploadError } = await appSupabase.storage.from('gallery').upload(finalFile.name, finalFile);
                if (uploadError) throw uploadError;

                submitBtn.innerText = "正在落笔生花...";
                const { data: { publicUrl } } = appSupabase.storage.from('gallery').getPublicUrl(finalFile.name);
                const { error: dbError } = await appSupabase.from('photos').insert([{ title, author: name, image_url: publicUrl }]);
                if (dbError) throw dbError;
                
                showToast("回忆已成功封存", "success"); 
                toggleModal(false); 
                fileInput.value = ''; document.getElementById('photoTitle').value = '';
                loadPhotos();
            } catch (error) {
                showToast("投递失败，请检查网络", "error");
            } finally {
                submitBtn.innerText = "封存"; submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
