<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光集 - 岁月留影</title>
    <script src="https://fastly.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://fastly.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    
    <style>
        /* =========================================
           1. 极简设计系统 (2026 Design Tokens)
           ========================================= */
        :root {
            --bg-base: #F7F9F8; 
            --text-dark: #2C3631; 
            --text-muted: #8B9992; 
            --accent-color: #8CA192; 
            --accent-hover: #7A9080;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 12px 30px rgba(0,0,0,0.03);
            --shadow-hover: 0 20px 40px rgba(140, 161, 146, 0.12);
            --cubic-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--bg-base) 0%, #E8EDE9 100%);
            color: var(--text-dark); min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 硬件加速微光背景 */
        #bg-fx { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .mote {
            position: absolute; bottom: -10%; background: #fff; border-radius: 50%;
            opacity: 0; will-change: transform, opacity; animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 0; }
            30% { opacity: 0.6; }
            100% { transform: translate3d(15vw, -110vh, 0) scale(1.2); opacity: 0; }
        }

        /* =========================================
           2. 顶部导航与全局交互
           ========================================= */
        header { position: relative; z-index: 10; padding: 60px 20px 30px; text-align: center; }
        h1 { margin: 0; font-size: 34px; letter-spacing: 6px; font-weight: 500; }
        .poetry-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px; max-width: 600px;
            margin: 20px auto; padding: 25px; box-shadow: var(--shadow-soft);
        }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .btn {
            background: var(--accent-color); color: white; border: none; padding: 12px 28px;
            border-radius: 50px; font-size: 14px; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(140, 161, 146, 0.25); outline: none;
            transition: transform 0.3s var(--cubic-bounce), box-shadow 0.3s ease;
            will-change: transform;
        }
        .btn-outline { background: var(--glass-bg); color: var(--text-dark); border: 1px solid var(--glass-border); backdrop-filter: blur(10px); box-shadow: none; }
        .btn:hover { transform: translate3d(0, -3px, 0); box-shadow: var(--shadow-hover); }
        .btn:active { transform: translate3d(0, 1px, 0); }

        /* =========================================
           3. 视口渲染容器 & 模式布局
           ========================================= */
        #main-container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 20px 40px 80px; }
        
        /* 瀑布流 */
        .view-gallery { column-count: 3; column-gap: 28px; }
        
        /* 岁月轴 */
        .view-timeline { display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; }
        .view-timeline::before { content: ''; position: absolute; width: 2px; background: rgba(140, 161, 146, 0.2); top: 0; bottom: 0; left: 50%; margin-left: -1px; z-index: 0; }
        .time-badge { align-self: center; background: var(--glass-bg); padding: 8px 24px; border-radius: 50px; border: 1px solid var(--glass-border); font-size: 14px; font-weight: bold; margin: 40px 0 20px; z-index: 2; backdrop-filter: blur(10px); }
        .tl-row { display: flex; width: 100%; position: relative; z-index: 1; }
        .tl-left, .tl-right { width: 50%; padding: 15px 30px; position: relative; }
        .tl-right { margin-left: auto; }
        .tl-row::after { content: ''; position: absolute; width: 10px; height: 10px; background: white; border: 3px solid var(--accent-color); border-radius: 50%; top: 40px; left: 50%; transform: translateX(-50%); z-index: 3; box-shadow: 0 0 10px rgba(140,161,146,0.2); }

        /* =========================================
           4. 极速视绸划入 & 明信片 3D 架构
           ========================================= */
        .card-wrapper {
            break-inside: avoid; margin-bottom: 28px;
            /* 核心视差动效起点 */
            opacity: 0; transform: translate3d(0, 30px, 0); 
            transition: opacity 0.6s ease, transform 0.8s var(--cubic-bounce);
            will-change: opacity, transform;
        }
        .card-wrapper.is-visible { opacity: 1; transform: translate3d(0, 0, 0); }

        .card-inner {
            position: relative; width: 100%; transform-style: preserve-3d;
            transition: transform 0.8s var(--cubic-bounce); will-change: transform; cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        @media (hover: hover) {
            .card-wrapper:hover .card-inner:not(.is-flipped) { transform: translate3d(0, -6px, 0) scale(1.01); }
        }

        .card-front, .card-back {
            position: relative; width: 100%; backface-visibility: hidden; border-radius: 16px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft);
            padding: 12px 12px 18px 12px; 
        }
        .card-back {
            position: absolute; top: 0; left: 0; height: 100%; transform: rotateY(180deg);
            display: flex; flex-direction: column; padding: 0; overflow: hidden;
        }

        /* 灵魂排版：Anti-CLS 无裁切中心扩散 */
        .img-container { 
            width: 100%; min-height: 200px; border-radius: 10px; overflow: hidden; 
            background: rgba(140, 161, 146, 0.1); position: relative; 
            display: flex; align-items: center; justify-content: center;
        }
        .img-container img { 
            width: 100%; height: auto; display: block; 
            opacity: 0; transform: scale(0.95); 
            transition: opacity 0.6s ease, transform 0.6s var(--cubic-bounce); 
        }
        .img-container img.loaded { opacity: 1; transform: scale(1); }

        .card-info { padding-top: 16px; position: relative; text-align: center; }
        .card-title { margin: 0 0 6px; font-size: 15px; font-weight: bold; }
        .card-author { margin: 0; font-size: 12px; color: var(--text-muted); }

        /* 🍂 晨雾青落叶共鸣系统 */
        .like-btn {
            position: absolute; right: 0; bottom: 0; background: transparent; border: none;
            display: flex; align-items: center; gap: 4px; color: var(--accent-color);
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .like-btn svg { transition: transform 0.4s var(--cubic-bounce), filter 0.4s ease; }
        /* 脉冲点赞特效 */
        .like-btn.liked svg { 
            animation: pulse-cyan 0.5s var(--cubic-bounce); 
            filter: drop-shadow(0 0 6px rgba(140, 161, 146, 0.6));
        }
        @keyframes pulse-cyan {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.4) rotate(-15deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* 背面评论区布局 */
        .back-header { padding: 16px; border-bottom: 1px solid rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: bold; color: var(--accent-color); }
        .close-flip { background: rgba(140,161,146,0.1); border: none; padding: 4px 10px; border-radius: 20px; color: var(--accent-color); cursor: pointer; font-size: 12px; transition: 0.3s; }
        .close-flip:hover { background: rgba(140,161,146,0.2); }
        
        .comments-list { flex: 1; padding: 16px; overflow-y: auto; font-size: 13px; scrollbar-width: none; text-align: left; transition: opacity 0.4s ease; }
        .comments-list::-webkit-scrollbar { display: none; }
        .comment-item { margin-bottom: 14px; line-height: 1.5; animation: fadeInUp 0.4s ease backwards; }
        
        .comment-input-box { padding: 12px; border-top: 1px solid rgba(0,0,0,0.04); display: flex; gap: 8px; background: #fff; }
        .comment-input-box input { flex: 1; padding: 10px; border: 1px solid #E8EDE9; border-radius: 12px; font-size: 12px; outline: none; background: #F7F9F8; transition: 0.3s; }
        .comment-input-box input:focus { border-color: var(--accent-color); background: #fff; }
        .comment-input-box button { background: var(--accent-color); color: white; border: none; border-radius: 10px; padding: 0 16px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;}

        /* =========================================
           5. 全面屏自适应 & 明信片留白
           ========================================= */
        @media (max-width: 900px) { .view-gallery { column-count: 2; column-gap: 20px; } }
        @media (max-width: 600px) { 
            #main-container { padding: 10px 0 60px 0; } /* 容器去除内边距 */
            .view-gallery { column-count: 1; }
            /* 移动端留白明信片感：依靠卡片外边距 */
            .view-gallery .card-wrapper { margin: 0 16px 28px 16px; } 
            
            .view-timeline::before { left: 24px; }
            .tl-row { flex-direction: column; }
            .tl-left, .tl-right { width: 100%; padding: 10px 16px 15px 50px; }
            .tl-row::after { left: 24px; top: 35px; width: 10px; height: 10px; }
            .time-badge { align-self: flex-start; margin-left: 24px; }
            header h1 { font-size: 28px; }
        }

        /* 唱片音乐播放器 */
        .music-player { 
            position: fixed; bottom: 30px; right: 30px; z-index: 999; width: 48px; height: 48px; 
            border-radius: 50%; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            animation: spin 5s linear infinite; transition: transform 0.3s var(--cubic-bounce), filter 0.3s ease; 
            will-change: transform, filter; background: #1a1a1a; display: flex; align-items: center; justify-content: center;
        }
        .music-player::after { content: ''; width: 14px; height: 14px; background: var(--accent-color); border-radius: 50%; border: 3px solid #F7F9F8;}
        .music-player::before { content: ''; position:absolute; width: 38px; height: 38px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; }
        .music-player.paused { animation-play-state: paused; filter: grayscale(80%) opacity(0.7); }
        .music-player:hover { transform: scale(1.08); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 模态框统一 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; will-change: opacity;}
        .modal.show { opacity: 1; visibility: visible; }
        .modal-box { background: rgba(255,255,255,0.98); padding: 35px 25px; border-radius: 24px; width: 88%; max-width: 340px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.15); transform: scale(0.95); transition: transform 0.4s var(--cubic-bounce); will-change: transform;}
        .modal.show .modal-box { transform: scale(1); }
        .input-box { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #E8EDE9; border-radius: 14px; background: #F7F9F8; text-align: center; outline: none; appearance: none; font-family: inherit; transition: 0.3s; }
        .input-box:focus { border-color: var(--accent-color); background: #fff;}
        .toast { position: fixed; top: 30px; left: 50%; transform: translate3d(-50%, -20px, 0); background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 12px 24px; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); opacity: 0; pointer-events: none; transition: 0.4s var(--cubic-bounce); z-index: 9999; will-change: transform, opacity; color: var(--text-dark); font-weight: 500;}
        .toast.show { opacity: 1; transform: translate3d(-50%, 0, 0); }
    </style>
</head>
<body>

    <div id="bg-fx"></div>
    <div id="toast" class="toast"></div>

    <header>
        <h1>拾光集</h1>
        <div class="poetry-card">
            <div style="font-style: italic; color: var(--text-muted); font-size: 14px; margin-bottom: 8px;">"We do not remember days, we remember moments."</div>
            <div style="font-size: 16px; letter-spacing: 2px; font-weight: 500;">岁月无声，唯有拾光。</div>
        </div>
        <div class="controls">
            <button class="btn btn-outline" id="modeBtn" onclick="toggleMode()">岁月模式</button>
            <button class="btn" onclick="toggleUploadModal(true)">珍藏此刻 ✨</button>
        </div>
    </header>

    <main id="main-container" class="view-gallery"></main>

    <div id="uploadModal" class="modal">
        <div class="modal-box">
            <h3 style="margin: 0 0 20px; color: var(--accent-color);">时光信笺</h3>
            <input type="file" id="photoFile" accept="image/*" class="input-box" style="border-style: dashed; padding: 10px; cursor: pointer;">
            <input type="text" id="photoTitle" placeholder="给这段回忆起个名字..." class="input-box" autocomplete="off">
            <input type="text" id="uploaderName" placeholder="你的署名" class="input-box" autocomplete="off">
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button class="btn btn-outline" style="flex:1; padding: 12px 0;" onclick="toggleUploadModal(false)">收起</button>
                <button class="btn" id="submitBtn" style="flex:1; padding: 12px 0;" onclick="submitPhoto(event)">封存</button>
            </div>
        </div>
    </div>

    <div id="identityModal" class="modal" style="z-index: 1001;">
        <div class="modal-box">
            <h3 style="margin: 0 0 15px; color: var(--accent-color); font-size: 16px;">时光旅人</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5;">请留下你的名号<br>让这声回音有迹可循</p>
            <input type="text" id="identityName" placeholder="怎么称呼你？" class="input-box" autocomplete="off">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" style="flex:1;" onclick="document.getElementById('identityModal').classList.remove('show'); pendingCommentAction = null;">取消</button>
                <button class="btn" style="flex:1;" onclick="confirmIdentity()">缔结契约</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="xvni.mp3" type="audio/mpeg"></audio>
    <div id="musicBtn" class="music-player paused" onclick="toggleMusic()" title="播放音乐"></div>

    <script>
        // ==========================================
        // 🚀 核心架构与 SDK 配置
        // ==========================================
        const COS_CONFIG = {
            SecretId: 'AKIDcSIyb6LHfzGL' + 'BoEPM4XmocFdu8D4iFcm',
            SecretKey: 'xgIuRvJfsrbIqhKt' + 'QwKi4II3OeolU0JN',
            Bucket: 'thysummer-1420216801', Region: 'ap-beijing'
        };
        const SUPABASE_CONFIG = {
            Url: 'https://vwuulslskezoerbtnjte.supabase.co',
            Key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3dXVsc2xza2V6b2VyYnRuanRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjQ1NTQsImV4cCI6MjA5MTMwMDU1NH0.bEBeflj63BjeOD_mv20bD-gIXY8O6NunBOkjp6JtokI'
        };

        const cos = new COS({ SecretId: COS_CONFIG.SecretId, SecretKey: COS_CONFIG.SecretKey });
        const appSupabase = window.supabase ? window.supabase.createClient(SUPABASE_CONFIG.Url, SUPABASE_CONFIG.Key) : null;

        // ==========================================
        // 🧠 状态机与智能观察器 (Anti-Bug 核心)
        // ==========================================
        const State = { photos: [], currentMode: 'gallery' };
        let currentlyFlippedCard = null;
        let pendingCommentAction = null; 
        
        // 【关键修复】软键盘锁机制
        let isKeyboardActive = false;
        document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT') isKeyboardActive = true; });
        document.addEventListener('focusout', (e) => { if (e.target.tagName === 'INPUT') isKeyboardActive = false; });

        // 丝滑划入引擎 (Anti-CLS)
        const appearObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    appearObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '50px' });

        // 【关键修复】视口保护式复位 (无感翻转)
        const flipObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                // 当卡片滑出视口 80% (可见度低于20%)，且当前没有唤起键盘时才触发复位
                if (!entry.isIntersecting && !isKeyboardActive && entry.target.classList.contains('is-flipped')) {
                    entry.target.classList.remove('is-flipped');
                    flipObserver.unobserve(entry.target);
                    if (currentlyFlippedCard === entry.target) currentlyFlippedCard = null;
                }
            });
        }, { threshold: 0.2 });

        // ==========================================
        // ✨ 数据挂载与双模渲染工厂
        // ==========================================
        async function loadData() {
            if (!appSupabase) return showToast("云端数据库未连接", "error");
            const { data, error } = await appSupabase.from('photos').select('*').order('created_at', { ascending: false });
            if (error) return showToast("打捞记忆碎片失败", "error");
            State.photos = data;
            renderEngine();
        }

        function renderEngine() {
            const container = document.getElementById('main-container');
            container.className = State.currentMode === 'gallery' ? 'view-gallery' : 'view-timeline';
            let html = '';

            if (State.currentMode === 'gallery') {
                html = State.photos.map(p => createCardHTML(p, 'card-wrapper')).join('');
            } else {
                const grouped = State.photos.reduce((acc, p) => {
                    const d = new Date(p.created_at);
                    const key = `${d.getFullYear()}年 ${String(d.getMonth()+1).padStart(2,'0')}月`;
                    (acc[key] || (acc[key] = [])).push(p); return acc;
                }, {});
                
                for (const [month, list] of Object.entries(grouped)) {
                    html += `<div class="time-badge">${month}</div>`;
                    for (let i = 0; i < list.length; i += 2) {
                        html += `<div class="tl-row">
                            <div class="tl-left">${createCardHTML(list[i], 'card-wrapper')}</div>
                            ${list[i+1] ? `<div class="tl-right">${createCardHTML(list[i+1], 'card-wrapper')}</div>` : ''}
                        </div>`;
                    }
                }
            }
            container.innerHTML = html;
            document.querySelectorAll('.card-wrapper').forEach(el => appearObserver.observe(el));
        }

        function createCardHTML(p, wrapperClass) {
            // 🍂 晨雾青落叶图标
            const leafIcon = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17.5 2C15.5 2 13 3.5 12 5.5C11 3.5 8.5 2 6.5 2 3.5 2 2 5 2 8c0 5 9.5 13 10 13s10-8 10-13c0-3-1.5-6-4.5-6zm-5.5 11c-2.5-3-5.5-4-5.5-4s2.5 0 5.5 4zm0 0c2.5-3 5.5-4 5.5-4s-2.5 0-5.5 4z"/></svg>`;
            
            return `
            <div class="${wrapperClass}">
                <div class="card-inner" data-id="${p.id}">
                    <div class="card-front">
                        <div class="img-container">
                            <img src="${p.image_url}" loading="lazy" onload="this.classList.add('loaded')">
                        </div>
                        <div class="card-info">
                            <p class="card-title">${p.title}</p>
                            <p class="card-author">@${p.author}</p>
                            <button class="like-btn" data-action="like" data-id="${p.id}">
                                ${leafIcon} <span>${p.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="back-header">拾光回音 <button class="close-flip" data-action="close">合上</button></div>
                        <div class="comments-list" id="comments-${p.id}">
                            <div style="text-align:center; padding:20px; color:var(--text-muted); opacity:0.6">翻阅中...</div>
                        </div>
                        <div class="comment-input-box">
                            <input type="text" id="in-${p.id}" placeholder="落笔共鸣..." autocomplete="off">
                            <button data-action="send" data-id="${p.id}">留印</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // ==========================================
        // 🎮 全局纯净事件路由 (彻底解决拦截Bug)
        // ==========================================
        document.getElementById('main-container').addEventListener('click', async (e) => {
            const likeBtn = e.target.closest('[data-action="like"]');
            const sendBtn = e.target.closest('[data-action="send"]');
            const closeBtn = e.target.closest('[data-action="close"]');
            const cardBack = e.target.closest('.card-back');
            const cardInner = e.target.closest('.card-inner');

            // 1. 点赞系统 (落叶特效)
            if (likeBtn) {
                e.stopPropagation(); 
                const id = likeBtn.dataset.id;
                const span = likeBtn.querySelector('span');
                let currentLikes = parseInt(span.innerText);
                
                // 触发脉冲动画
                likeBtn.classList.add('liked');
                setTimeout(() => likeBtn.classList.remove('liked'), 600);
                
                span.innerText = currentLikes + 1;
                appSupabase.from('photos').update({ likes: currentLikes + 1 }).eq('id', id).then();
                return;
            }

            // 2. 评论鉴权与发送
            if (sendBtn) {
                e.stopPropagation();
                const id = sendBtn.dataset.id;
                const content = document.getElementById(`in-${id}`).value.trim();
                if (!content) return;
                
                const nickname = localStorage.getItem('nickname');
                if (!nickname) {
                    pendingCommentAction = { id, content };
                    document.getElementById('identityModal').classList.add('show');
                    return;
                }
                executeComment(id, nickname, content);
                return;
            }

            // 3. 关闭背面
            if (closeBtn) {
                e.stopPropagation();
                cardInner.classList.remove('is-flipped');
                flipObserver.unobserve(cardInner);
                currentlyFlippedCard = null;
                return;
            }
            
            // 阻断背面空白区域被误触
            if (cardBack) { return; }

            // 4. 正面翻转与极致预加载
            if (cardInner && !cardInner.classList.contains('is-flipped')) {
                // 排他性：合上其他卡片
                if (currentlyFlippedCard && currentlyFlippedCard !== cardInner) {
                    currentlyFlippedCard.classList.remove('is-flipped');
                    flipObserver.unobserve(currentlyFlippedCard);
                }
                cardInner.classList.add('is-flipped');
                currentlyFlippedCard = cardInner;
                
                // 绑定视口观察器，用于自动合上
                flipObserver.observe(cardInner);
                loadComments(cardInner.dataset.id); 
            }
        });

        // ==========================================
        // 💬 回音系统业务逻辑
        // ==========================================
        async function executeComment(id, nickname, content) {
            const input = document.getElementById(`in-${id}`);
            input.value = '投递中...'; input.disabled = true;
            const { error } = await appSupabase.from('comments').insert([{ photo_id: id, nickname, content }]);
            input.value = ''; input.disabled = false;
            if (!error) loadComments(id);
        }

        function confirmIdentity() {
            const name = document.getElementById('identityName').value.trim();
            if (!name) return showToast('契约需留名哦', 'error');
            localStorage.setItem('nickname', name);
            document.getElementById('identityModal').classList.remove('show');
            if (pendingCommentAction) {
                executeComment(pendingCommentAction.id, name, pendingCommentAction.content);
                pendingCommentAction = null;
            }
        }

        async function loadComments(id) {
            const list = document.getElementById(`comments-${id}`);
            list.style.opacity = 0.5; 
            const { data, error } = await appSupabase.from('comments').select('*').eq('photo_id', id).order('created_at', { ascending: true });
            
            setTimeout(() => {
                list.innerHTML = data && data.length ? data.map(c => `
                    <div class="comment-item">
                        <span style="color:var(--accent-color); font-weight:600;">${c.nickname}</span>：<span style="color:#555">${c.content}</span>
                    </div>`).join('') : '<div style="text-align:center; padding:20px; color:var(--text-muted);">信笺背面空空如也，留下第一道印记吧。</div>';
                list.style.opacity = 1;
                list.scrollTop = list.scrollHeight;
            }, 150); 
        }

        // ==========================================
        // 🚀 OffscreenCanvas 离屏图片压缩
        // ==========================================
        async function compressImage(file) {
            const bitmap = await createImageBitmap(file);
            let w = bitmap.width, h = bitmap.height;
            if (w > 1200) { h = Math.round(h * (1200 / w)); w = 1200; }

            if (window.OffscreenCanvas) {
                const oc = new OffscreenCanvas(w, h);
                const ctx = oc.getContext('2d');
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(bitmap, 0, 0, w, h);
                bitmap.close();
                return oc.convertToBlob({ type: 'image/webp', quality: 0.82 });
            } else {
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
                bitmap.close();
                return new Promise(res => canvas.toBlob(res, 'image/webp', 0.82));
            }
        }

        window.submitPhoto = async (e) => {
            const file = document.getElementById('photoFile').files[0];
            const title = document.getElementById('photoTitle').value.trim();
            const name = document.getElementById('uploaderName').value.trim();
            if (!file || !title || !name) return showToast("墨水似乎不够，请填写完整", "error");
            
            localStorage.setItem('nickname', name);
            const btn = e.target; btn.disabled = true; btn.innerText = "压缩图谱...";
            
            try {
                const finalFile = await compressImage(file);
                btn.innerText = "跨越星海...";
                const path = `photos/${Date.now()}.webp`;
                const cosRes = await new Promise((res, rej) => cos.putObject({ Bucket: COS_CONFIG.Bucket, Region: COS_CONFIG.Region, Key: path, Body: finalFile }, (err, data) => err ? rej(err) : res(data)));
                
                btn.innerText = "落笔生花...";
                await appSupabase.from('photos').insert([{ title, author: name, image_url: `https://${cosRes.Location}` }]);
                
                showToast("信笺已封存", "success");
                toggleUploadModal(false); loadData();
            } catch (err) { showToast("星空拥堵，请重试", "error"); }
            finally { btn.disabled = false; btn.innerText = "封存"; }
        };

        // ==========================================
        // 🎛️ UI 辅助组件控制器
        // ==========================================
        window.toggleMode = () => {
            State.currentMode = State.currentMode === 'gallery' ? 'timeline' : 'gallery';
            document.getElementById('modeBtn').innerText = State.currentMode === 'gallery' ? '岁月模式' : '画廊模式';
            renderEngine();
        };

        window.toggleUploadModal = (show) => {
            const m = document.getElementById('uploadModal');
            if (show) { m.classList.add('show'); document.getElementById('uploaderName').value = localStorage.getItem('nickname') || ''; }
            else { m.classList.remove('show'); document.getElementById('photoFile').value=''; document.getElementById('photoTitle').value=''; }
        };

        window.toggleMusic = () => {
            const m = document.getElementById('bgMusic'), btn = document.getElementById('musicBtn');
            m.paused ? m.play().then(() => btn.classList.remove('paused')).catch(()=>showToast('需先交互页面才能播放')) : (m.pause(), btn.classList.add('paused'));
        };

        let tTimer; window.showToast = (msg, type='info') => {
            const t = document.getElementById('toast'); t.innerHTML = `${type==='error'?'🍂':'✨'} ${msg}`;
            t.classList.add('show'); clearTimeout(tTimer); tTimer = setTimeout(()=>t.classList.remove('show'), 2500);
        };

        // 背景粒子注入
        const frag = document.createDocumentFragment();
        for(let i=0; i<(window.innerWidth<=600?10:18); i++){
            const m = document.createElement('i'); m.className='mote';
            m.style.width=m.style.height=(Math.random()*4+2)+'px';
            m.style.left=Math.random()*100+'vw'; m.style.animationDuration=(Math.random()*8+6)+'s';
            m.style.animationDelay=Math.random()*5+'s'; frag.appendChild(m);
        }
        document.getElementById('bg-fx').appendChild(frag);
        
        // 启动引擎
        loadData();
    </script>
</body>
</html>
